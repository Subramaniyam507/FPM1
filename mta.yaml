_schema-version: 3.3.0
ID: FPM1
description: A simple CAP project.
version: 1.0.0
modules:
- name: FPM1-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: FPM1-db
  - name: FPM1-connectivity
  - name: FPM1-destination
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: FPM1-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: FPM1-db
  parameters:
    buildpack: nodejs_buildpack
- name: FPM1-destination-content
  type: com.sap.application.content
  requires:
  - name: FPM1-destination
    parameters:
      content-target: true
  - name: FPM1_html_repo_host
    parameters:
      service-key:
        name: FPM1_html_repo_host-key
  - name: uaa_FPM1
    parameters:
      service-key:
        name: uaa_FPM1-key
  parameters:
    content:
      instance:
        destinations:
        - Name: zfpm_FPM1_html_repo_host
          ServiceInstanceName: FPM1-html5-app-host-service
          ServiceKeyName: FPM1_html_repo_host-key
          sap.cloud.service: zfpm
        - Authentication: OAuth2UserTokenExchange
          Name: zfpm_uaa_FPM1
          ServiceInstanceName: uaa_FPM1
          ServiceKeyName: uaa_FPM1-key
          sap.cloud.service: zfpm
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
resources:
- name: FPM1-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: FPM1-connectivity
  type: org.cloudfoundry.managed-service
  parameters:
    service: connectivity
    service-plan: lite
- name: FPM1-destination
  type: org.cloudfoundry.managed-service
  parameters:
    service: destination
    service-plan: lite
- name: FPM1_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: FPM1-html5-app-host-service
    service-plan: app-host
- name: uaa_FPM1
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
